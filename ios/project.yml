name: SwingCheck
options:
  bundleIdPrefix: com.graceyan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  SwingCheck:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Swing Check
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Record your golf swing so it can be analyzed on-device."
        NSPhotoLibraryUsageDescription: "Choose a swing video from your library to analyze."
        NSMicrophoneUsageDescription: "Recording a swing video captures audio too."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graceyan.swingcheck
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
